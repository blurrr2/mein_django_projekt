{% extends 'layout.html' %}
{% load wagtailcore_tags %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container my-5">
    <h1 class="mb-5 text-center">{{ title }}</h1>
    
    {% for post in posts %}
    <div class="card mb-5 shadow-sm mx-auto" style="max-width: 720px;">
        <div class="card-body py-4">
            
            <!-- 标题（加粗 + 稍微居中） -->
            <h2 class="text-center mb-2">
                <a href="{% pageurl post %}" class="text-decoration-none text-dark">
                    {{ post.title }}
                </a>
            </h2>
            
            <!-- 日期 -->
            <p class="text-muted text-center mb-0">
                {{ post.date|date:"Y-m-d" }}
            </p>
            
            <div class="text-center mt-4">
                <a href="{% pageurl post %}" class="btn btn-primary">
                    READ ARTICLE →
                </a>
            </div>
        </div>
    </div>
    {% empty %}
    <p class="text-center text-muted">NO ARTICLES</p>
    {% endfor %}
</div>
{% endblock %}
