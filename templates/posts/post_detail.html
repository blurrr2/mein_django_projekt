{% extends 'layout.html' %}
{% load wagtailcore_tags %}

{% block title %}{{ self.title }}{% endblock %}

{% block content %}
<div class="container my-5" style="max-width: 760px;">

    <!-- 小 badge（你想保留的框） -->
    <div class="d-inline-flex align-items-center bg-light rounded-pill px-3 py-1 mb-3" style="font-size: 0.95rem;">
        <span class="text-success me-1">✔</span>
        {{ self.get_parent.title }}
    </div>

    <!-- 大标题（醒目、优雅） -->
    <h1 style="font-family: Georgia, 'Times New Roman', serif; font-weight: 700; font-size: 2.45rem; line-height: 1.25; margin-bottom: 0.8rem;">
        {{ self.title }}
    </h1>

    <!-- 日期 -->
    <p class="text-muted mb-5" style="font-size: 1.05rem;">
        {{ self.date|date:"Y-m-d" }}
    </p>

    <!-- 正文 -->
    <div class="post-body" style="font-size: 1.1rem; line-height: 1.8;">
        {{ self.body }}
    </div>

    <hr class="my-5">

    <!-- 返回按钮 -->
    <a href="{% pageurl self.get_parent %}" class="btn btn-outline-secondary">
        ← Return 
    </a>

</div>
{% endblock %}
