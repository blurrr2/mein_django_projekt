{% extends 'layout.html' %}
{% load wagtailcore_tags %}

{% block title %}{{ self.title }}{% endblock %}

{% block content %}
<div class="container my-5">
    <div style="max-width: 760px; margin: 0 auto;">

    <!-- 正文 -->
    <div class="post-body" style="font-size: 1.13rem; line-height: 1.85; color: #222;">
            {{ self.body }}
        </div>

        <hr class="my-5">

    <!-- 返回按钮 -->
    <a href="{% pageurl self.get_parent %}" class="btn btn-outline-secondary">
        ← Return 
    </a>

</div>
{% endblock %}
