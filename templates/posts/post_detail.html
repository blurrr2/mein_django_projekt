{% extends 'layout.html' %}
{% load wagtailcore_tags %}   <!-- 必须加载 -->

{% block title %}{{ self.title }}{% endblock %}

{% block content %}
<div class="container my-5">
    <h1>{{ self.title }}</h1>
    
    <p class="text-muted">
        {{ self.date|date:"Y-m-d" }} · 
        {{ self.get_category_display|default:self.category }}
    </p>
    
    <!-- 文章正文（支持 Raw HTML 和 StreamField） -->
    <div class="post-body">
        {{ self.body }}
    </div>
    
    <hr>
    <a href="{% url 'german_learning_list' %}" class="btn btn-secondary">← 返回列表</a>
</div>
{% endblock %}
