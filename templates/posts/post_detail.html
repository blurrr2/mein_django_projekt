{% extends 'layout.html' %}
{% load wagtailcore_tags %}

{% block title %}{{ self.title }}{% endblock %}

{% block content %}
<div class="container my-5" style="max-width: 760px;">


    <!-- 正文 -->
    <div class="post-body" style="font-size: 1.1rem; line-height: 1.8;">
        {{ self.body }}
    </div>

    <hr class="my-5">

    <!-- 返回按钮 -->
    <a href="{% pageurl self.get_parent %}" class="btn btn-outline-secondary">
        ← Return 
    </a>

</div>
{% endblock %}
